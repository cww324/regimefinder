  logic_hash: e9ae2605460071d4552c3312730e7190bf5fd4e49b31e5d5994a6e35848657b2
  description: Shock-reversion after high RV48 with ATR deceleration.
  rationale: Test post-shock reversal when realized volatility remains elevated but
    range expansion decelerates.
  WHY: Use rv48 shock state with atr14 slope deceleration to capture exhaustion-style
    reversals.
  RULES:
  - Require RV48 percentile >= 0.90.
  - Require ATR14 first difference < 0 for last 3 bars.
  - Require close-vwap48 distance sign unchanged for last 2 bars.
  - Trade opposite the current close-vwap48 distance sign.
  PARAMETERS:
    lookback_days: 180
    horizon_bars: 8
    rv48_pct_min: 0.9
    atr14_decline_bars: 3
    distance_sign_stability_bars: 2
    direction_mode: opposite_vwap_distance_sign
  FAILURE_CONDITIONS:
  - Shock regimes trend longer than expected.
  - ATR deceleration is too noisy as exhaustion proxy.
  - Opposite-sign entries catch continuation legs.
  EXPECTED_FAILURE_MODE: Persistent high-volatility trends overwhelm reversal premise
    and generate serial stop-like losses.
  entry_rules:
  - Require rv48_pct >= 0.90.
  - Require atr14[t]-atr14[t-1] < 0 for 3 consecutive bars.
  - Require sign(close-vwap48) stable for last 2 bars.
  - Enter opposite sign(close-vwap48).
  exit_rules:
  - Hold for fixed horizon bars.
  required_inputs:
  - BTC-USD 5m OHLCV
  - atr14 feature
  - rv48 feature
  - vwap48 feature
  parameters:
    lookback_days: 180
    horizon_bars: 8
    fixed:
      rv48_pct_min: 0.9
      atr14_decline_bars: 3
      distance_sign_stability_bars: 2
