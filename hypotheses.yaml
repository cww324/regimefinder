- id: H120
  family: range_structure
  class: tradeable_hypothesis
  logic_hash: ca0df5814108bcedbaa1df63904eef82dc95b4855457938fd37cb30d436b20f2
  description: Inside-bar range break continuation with ER and RV gates.
  rationale: Test break continuation only when a tight inside-bar setup resolves with
    acceptable efficiency and volatility context.
  WHY: Use structural inside-bar setup plus breakout resolution to avoid generic prior-high/prior-low
    triggers.
  RULES:
  - Define 18-bar prior high/low excluding current bar.
  - 'Require inside-bar setup: prior bar high < prior_high_18 and prior bar low >
    prior_low_18.'
  - Entry on current close breakout above prior_high_18 or below prior_low_18.
  - Require er20 >= 0.40 and rv48_pct in [0.30, 0.80).
  - Trade in breakout direction.
  PARAMETERS:
    lookback_days: 180
    horizon_bars: 8
    breakout_lookback_bars: 18
    require_inside_bar_setup: true
    er20_min: 0.4
    rv48_pct_min: 0.3
    rv48_pct_max: 0.8
    direction_mode: breakout_sign
  FAILURE_CONDITIONS:
  - Inside-bar setups break frequently in low-liquidity chop.
  - ER filter misses true breakouts that start from low efficiency.
  - RV band truncates high-conviction expansion legs.
  EXPECTED_FAILURE_MODE: Frequent false range breaks produce churn before directional
    extension materializes.
  entry_rules:
  - Compute prior_high_18 and prior_low_18 from trailing 18 bars excluding current.
  - Require inside bar at t-1 inside [prior_low_18, prior_high_18].
  - Long if close_t > prior_high_18; short if close_t < prior_low_18.
  - Require er20 >= 0.40.
  - Require 0.30 <= rv48_pct < 0.80.
  exit_rules:
  - Hold for fixed horizon bars.
  required_inputs:
  - BTC-USD 5m OHLCV
  - rolling 18-bar prior high/low
  - inside-bar detector
  - er20 feature
  - rv48 percentile feature
  parameters:
    lookback_days: 180
    horizon_bars: 8
    fixed:
      breakout_lookback_bars: 18
      require_inside_bar_setup: true
      er20_min: 0.4
      rv48_pct_min: 0.3
      rv48_pct_max: 0.8
      direction_mode: breakout_sign
