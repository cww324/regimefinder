  description: BTC-ETH spread dislocation mean-reversion under mid-volatility regimes.
  rationale: Test a cross-asset dislocation family that is orthogonal to single-asset
    threshold logic.
  WHY: Target short-horizon spread shocks between BTC and ETH expected to mean-revert
    when both assets are in non-extreme RV states.
  RULES:
  - Define 5m spread return s_t = ret1_btc - ret1_eth.
  - Compute rolling z-score of spread over 96 bars.
  - 'Entry gate: abs(z_spread) >= 2.0.'
  - 'Regime gate: rv48_pct_btc and rv48_pct_eth both in [0.25, 0.80).'
  - 'Session gate: only evaluate entries during UTC 08:00-22:00.'
  - 'Direction: if z_spread >= 2.0 short BTC; if z_spread <= -2.0 long BTC.'
  - No new entry while position is open; apply 2-bar cooldown after exit.
  PARAMETERS:
    lookback_days: 180
    horizon_bars: 8
    spread_z_window_bars: 96
    z_entry_threshold: 2.0
    rv48_pct_min: 0.25
    rv48_pct_max: 0.8
    session_start_utc: 08:00
    session_end_utc: '22:00'
    cooldown_bars: 2
    direction_mode: opposite_spread_z_sign
  FAILURE_CONDITIONS:
  - Lead-lag assumption is unstable and spread shocks continue trending instead of
    reverting.
  - Session gate removes too many opportunities and produces insufficient sample/folds.
  - Spread signals are too correlated with existing momentum logic and provide no
    independent edge after costs.
  EXPECTED_FAILURE_MODE: During sustained directional markets, spread dislocations
    persist and mean-reversion entries are repeatedly run over.
  entry_rules:
  - Compute spread return s_t = ret1_btc - ret1_eth and z_spread over 96 bars.
  - Require abs(z_spread) >= 2.0.
  - Require 0.25 <= rv48_pct_btc < 0.80 and 0.25 <= rv48_pct_eth < 0.80.
  - Require UTC hour in [08:00, 22:00).
  - 'Enter opposite spread sign: z_spread > 0 => BTC short, z_spread < 0 => BTC long.'
  - Apply 2-bar cooldown after each closed trade.
  exit_rules:
  - Hold for fixed horizon bars.
  required_inputs:
  - BTC-USD 5m OHLCV
  - ETH-USD 5m OHLCV
  - ret1 feature for BTC and ETH
  - rv48 percentile features for BTC and ETH
  - UTC timestamp series
  parameters:
    lookback_days: 180
    horizon_bars: 8
