    daily_entry_quota: 2
    min_abs_slope_percentile: 0.75
    btc_vol_percentile_min: 0.3
    btc_vol_percentile_max: 0.85
  FAILURE_CONDITIONS:
  - Quota rejects too many valid opportunities in trend-persistent periods.
  - Ranking by absolute slope percentile overweights transient spikes.
  - Daily batching introduces path dependence and unstable fold behavior.
  EXPECTED_FAILURE_MODE: 'Quota path dependency: day-level selection order dominates
    outcomes and reduces consistency across walkforward folds.'
  entry_rules:
  - Generate candidates when BTC/ETH 1h slope signs agree and are non-zero.
  - Require ETH absolute slope percentile >= 0.75.
  - 'Require BTC realized-vol percentile: 0.30 <= vol < 0.85.'
  - Within each UTC day, keep top 2 candidates by ETH absolute slope percentile.
  - Trade BTC in shared slope-sign direction.
  exit_rules:
  - Hold for fixed horizon bars.
  required_inputs:
  - BTC-USD 5m closes
  - ETH-USD 5m closes
  - BTC realized-volatility percentile feature
  - ETH 1h EMA20 slope sign and absolute slope percentile
  - UTC day partition for quota accounting
  parameters:
    lookback_days: 180
    horizon_bars: 10
