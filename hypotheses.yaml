  description: Balanced-volatility carry with ATR/RV ratio filter.
  rationale: Test whether a stable ATR14-to-RV48 ratio identifies more persistent
    short-horizon directional carry.
  WHY: Introduce volatility-ratio regime logic orthogonal to pure slope-flip entries.
  RULES:
  - Compute ratio r = atr14 / rv48 (scaled to comparable units).
  - Require ratio percentile in [0.45, 0.70).
  - Require absolute close-vwap48 distance percentile in [0.50, 0.85).
