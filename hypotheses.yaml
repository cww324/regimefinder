- id: H147
  family: volume_state
  class: tradeable_hypothesis
  description: Low volume large bar — fade (mean reversion). A large BTC bar on
    very low volume lacks genuine participation and is likely to reverse.
  rationale: Large price moves on unusually low volume are characteristic of thin-book
    artifacts, spoofing, or temporary liquidity imbalances rather than genuine directional
    conviction. In liquid markets, real directional moves require volume participation.
    When a large bar occurs with very low volume (< p20), the probability of mean
    reversion is elevated — the move lacks the supply/demand imbalance needed to sustain.
  WHY: Test whether large-move + low-volume bars predict reversal over the next 6 bars.
    Shorter horizon (6 bars = 30 min) than CA-type signals because mean reversion
    tends to be faster than momentum continuation. Anchor candidate for volume_state
    MR signals.
  RULES:
  - Identify bars where ret1_abs_btc_pct >= 0.80 (top 20% bar size) AND volume_btc_pct <= 0.20.
  - Enter in OPPOSITE direction to bar_dir_btc (fade the move).
  - Event-triggered with dedup gap = horizon bars.
  - Horizon = 6 bars (30 min) — shorter for mean reversion.
  FAILURE_CONDITIONS:
  - Low volume moves in crypto may be legitimate breakouts in off-peak hours (Asia session).
  - Defining large + low-volume jointly may produce very few qualifying events.
  - 5m bar_dir_btc may not reliably measure the direction of the move being faded.
  entry_rules:
  - Fade (go opposite to bar direction) when ret1_abs_btc_pct >= 0.80 AND volume_btc_pct <= 0.20.
  - Direction = -bar_dir_btc. Event-triggered.
  exit_rules:
  - Hold for fixed 6 bars (30 min). No early exit.
  required_inputs:
  - BTC-USD 5m OHLCV (Coinbase)
  - ret1_abs_btc_pct and bar_dir_btc from load_frame()
  - volume_btc_pct computed in load_frame() from candle volume
  parameters:
    lookback_days: 365
    horizon_bars: 6
    fixed:
      volume_btc_pct_max: 0.20
      ret1_abs_btc_pct_min: 0.80
      direction: fade
  allowed_variants: []
  status: FAIL
  decision_date: "2026-02-23"
  decision_notes: "FAIL (cost-constrained). n=403, 1.1/day, gross=2.41bps P>0=0.984,
