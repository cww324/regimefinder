    abs_vwap_dist_z_min: 0.9
    rv48_pct_max: 0.92
    mode_switch: er20_state_machine
  FAILURE_CONDITIONS:
  - Switch threshold causes excessive mode-flipping around boundary.
  - Single threshold may not generalize across volatility regimes.
  - Distance requirement may not differentiate high-noise states.
  EXPECTED_FAILURE_MODE: Boundary churn near er20 threshold generates contradictory
    entries and elevated turnover noise.
  entry_rules:
  - Require abs(standardized close-vwap48 distance) >= 0.9 and rv48_pct < 0.92.
  - If er20 < 0.40 enter opposite sign(close-vwap48).
  - If er20 >= 0.40 enter same sign(close-vwap48).
  exit_rules:
  - Hold for fixed horizon bars.
  required_inputs:
  - BTC-USD 5m OHLCV
  - er20 feature
  - rv48 feature
