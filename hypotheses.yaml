  logic_hash: a89f73a0227b0b45606c70dbdf6c769daceb6c5d446fb85c01dba91377fe91b0
  description: Low-volatility compression breakout from vwap48 band.
  rationale: Test breakout behavior when ATR and RV jointly indicate compressed state.
  WHY: Orthogonal compression-breakout hypothesis based on atr14/rv48 thresholds and
    vwap48 band escape.
  RULES:
  - Require ATR14 percentile < 0.30 and RV48 percentile < 0.35.
  - Define vwap48 distance band using absolute z-normalized distance over 20-day window.
  - Trigger only when |dist_to_vwap48_z| crosses above 1.2 from below.
  - Trade in breakout direction sign(dist_to_vwap48).
  PARAMETERS:
    lookback_days: 180
    horizon_bars: 8
    atr14_pct_max: 0.3
    rv48_pct_max: 0.35
    vwap_distance_z_breakout: 1.2
    distance_norm_window_days: 20
  FAILURE_CONDITIONS:
  - Compression persists and breakouts fail quickly.
  - Distance normalization is unstable across volatility regimes.
  - Breakout threshold overfilters and reduces trade density.
  EXPECTED_FAILURE_MODE: False breakout clustering during low-liquidity ranges creates
    repeated whipsaw entries.
  entry_rules:
  - Require atr14_pct < 0.30 and rv48_pct < 0.35.
  - Compute standardized vwap48 distance z score.
  - Enter when abs(z) crosses from <=1.2 to >1.2, in z sign direction.
  exit_rules:
  - Hold for fixed horizon bars.
  required_inputs:
  - BTC-USD 5m OHLCV
  - atr14 feature
  - rv48 feature
  - vwap48 feature
