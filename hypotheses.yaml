- id: P01
  family: portfolio_construction
  class: tradeable_hypothesis
  logic_hash: 844d7cfc1215e95793d72ae09562b4f30ae5ffd8561d1b22e6c688336276577e
  description: Deduplicated core equal-weight portfolio over paper-candidate signal
    set.
  rationale: Separate portfolio-layer dedup test from standalone signal hypotheses
    by removing one near-duplicate member and preserving fixed-weight aggregation.
  WHY: Test whether reducing internal redundancy (H77/H79 pair) improves portfolio
    coherence without introducing adaptive weighting.
  RULES:
  - 'Candidate base set is fixed: H76,H77,H79,H81,H78,H82.'
  - 'Dedup rule is fixed and non-adaptive: keep H77, exclude H79.'
  - Combine active strategy signals with equal weights across included members.
  - Apply existing portfolio risk caps and one-position-per-strategy constraints already
    used by paper framework.
  PARAMETERS:
    lookback_days: 180
    horizon_bars: 8
    candidate_universe:
    - H76
    - H77
    - H79
    - H81
    - H78
    - H82
    dedup_keep: H77
    dedup_drop: H79
    weighting_mode: equal_weight_active
    max_active_strategies: 5
  FAILURE_CONDITIONS:
  - Dropped member contained unique conditional coverage despite apparent duplication.
  - Equal-weight aggregation overconcentrates during correlated bursts.
  - Reduced member count lowers diversification without improving coherence.
  EXPECTED_FAILURE_MODE: 'False dedup assumption: removed strategy contributes distinct
    edge in specific regimes, producing net degradation.'
  entry_rules:
  - 'Read member strategy directional intents from fixed included set: H76,H77,H81,H78,H82.'
  - Normalize each active member to unit notional vote and average equally.
  - Open/adjust portfolio exposure in averaged signal direction subject to existing
    caps.
  exit_rules:
  - Exit when combined active signal crosses zero or no member remains active.
  - Apply standard portfolio risk-stop behavior from existing execution framework.
  required_inputs:
  - Strategy signal states for H76,H77,H79,H81,H78,H82
  - BTC-USD 5m closes
  - ETH-USD 5m closes
  - Existing portfolio cap/exposure controls
  parameters:
    lookback_days: 180
    horizon_bars: 8
    fixed:
      candidate_universe:
      - H76
      - H77
      - H79
      - H81
      - H78
      - H82
      dedup_keep: H77
      dedup_drop: H79
      weighting_mode: equal_weight_active
      cap_policy: existing_portfolio_caps
  allowed_variants: []
  status: planned
- id: P02
  family: portfolio_construction
  class: tradeable_hypothesis
  logic_hash: 5535157cdade86e64f5b941703ae72115ee9d0484fd7379be9fe3031135d37c7
  description: Risk-adjusted rank-weight blend across fixed candidate universe.
  rationale: Test whether deterministic rank-weighting over recent quality metrics
    improves allocation discipline versus static equal weights.
  WHY: Evaluate a portfolio-construction layer that allocates by recent risk-adjusted
    quality while keeping strategy definitions frozen.
  RULES:
  - 'Candidate base set is fixed: H76,H77,H79,H81,H78,H82.'
  - 'Compute per-strategy score over trailing 30 calendar days: score_i = mean(5m
    strategy returns) / stdev(5m strategy returns).'
  - Clip negative scores to 0, then normalize by L1 sum to obtain active weights.
  - If all scores are <=0, fall back to equal-weight across currently active members.
  PARAMETERS:
    lookback_days: 180
    rank_window_days: 30
    score_formula: mean_over_std
    score_clip_floor: 0.0
    normalization: L1_on_positive_scores
    fallback_weighting: equal_weight_active
  FAILURE_CONDITIONS:
  - Ranking window too short leads to unstable weight turnover.
  - Risk-adjusted score overreacts to volatility compression artifacts.
  - Weight concentration breaches practical diversification intent.
  EXPECTED_FAILURE_MODE: 'Estimator noise: recent-window score instability causes
    excessive allocation churn and inconsistent portfolio behavior.'
  entry_rules:
  - Generate member intents from fixed universe strategies.
  - Rank members by trailing 30-day risk-adjusted score.
  - Allocate weights by positive-score normalization; apply to active intents only.
  - Apply fallback equal weighting when all scores are non-positive.
  exit_rules:
  - Exit or resize as member intents/weights update each rebalance step.
  - Flatten when no members are active.
  required_inputs:
  - Strategy signal states and return streams for H76,H77,H79,H81,H78,H82
  - BTC-USD 5m closes
  - ETH-USD 5m closes
  - Existing portfolio cap/exposure controls
  parameters:
    lookback_days: 180
    horizon_bars: 8
    fixed:
      candidate_universe:
      - H76
      - H77
      - H79
      - H81
      - H78
      - H82
      rank_window_days: 30
      score_formula: mean_over_std
      score_clip_floor: 0.0
      normalization: L1_on_positive_scores
      fallback_weighting: equal_weight_active
  allowed_variants: []
  status: planned
- id: P03
  family: portfolio_construction
  class: tradeable_hypothesis
  logic_hash: 820e748c47ca7e73c9d8e1e9080cdbdef63533c52f58397149da73c01e57f3aa
  description: Consensus-strength gated portfolio activation.
  rationale: Test whether requiring stronger cross-strategy directional agreement
    reduces noisy exposure periods.
  WHY: Evaluate a deterministic consensus gate as a portfolio-level filter above fixed
    standalone signals.
  RULES:
  - 'Candidate base set is fixed: H76,H77,H79,H81,H78,H82.'
  - 'Consensus metric: C = abs(sum(sign_i * w_i)) / sum(active_w_i), with sign_i in
    {-1,+1} and equal base weights.'
  - Open/maintain exposure only when C >= 0.67 and at least 3 members are active.
  - Direction is sign(sum(sign_i * w_i)); otherwise remain flat.
  PARAMETERS:
    lookback_days: 180
    consensus_threshold: 0.67
    min_active_members: 3
    base_weighting: equal_weight
    rebalance_interval_bars: 1
  FAILURE_CONDITIONS:
  - Gate suppresses too many trades and underutilizes valid weak-consensus edges.
  - Consensus spikes occur late after much of move already occurred.
  - Correlated false agreement produces concentrated wrong-way exposure.
  EXPECTED_FAILURE_MODE: 'Over-gating: participation collapses in mixed regimes, leaving
    sparse trades and unstable fold support.'
  entry_rules:
  - Compute member directional signs from fixed universe each bar.
  - Compute consensus metric C using equal base weights across active members.
  - Enter only when C >= 0.67 and active member count >= 3.
  - Trade in consensus direction.
  exit_rules:
  - Exit when C drops below 0.67 or active member count falls below 3.
  - Exit when consensus direction flips sign.
  required_inputs:
  - Strategy signal states for H76,H77,H79,H81,H78,H82
  - BTC-USD 5m closes
  - ETH-USD 5m closes
  - Existing portfolio cap/exposure controls
  parameters:
    lookback_days: 180
    horizon_bars: 8
    fixed:
      candidate_universe:
      - H76
      - H77
      - H79
      - H81
      - H78
      - H82
      consensus_metric: abs_signed_weighted_sum_over_active_weight
      consensus_threshold: 0.67
      min_active_members: 3
      base_weighting: equal_weight
  allowed_variants: []
  status: planned
- id: P04
  family: portfolio_construction
  class: tradeable_hypothesis
  logic_hash: f7906b66cfdb5bb1b44c141bb8d33a2157e4e92ffbee80501391bf6f09f66afc
  description: Session-aware blend using H81/H82 specialists plus core signals.
  rationale: Test explicit time-window specialization by routing session windows to
    specialist strategies while preserving a deterministic core fallback.
  WHY: Evaluate whether session-aware blending improves construction robustness without
    altering standalone signal definitions.
  RULES:
  - 'Core set is fixed: H76,H77,H79,H78.'
  - 'Session specialist mapping: UTC 08:00-16:00 -> H81 specialist; UTC 16:00-24:00
    -> H82 specialist.'
  - During mapped session, blend core equal-weight + session specialist with 60/40
    core/specialist split.
  - 'Fallback behavior: outside mapped windows or if specialist inactive, use core
    equal-weight only.'
  PARAMETERS:
    lookback_days: 180
    session_map:
      08:00-16:00: H81
      16:00-24:00: H82
    core_set:
    - H76
    - H77
    - H79
    - H78
    core_weight_share: 0.6
    specialist_weight_share: 0.4
    fallback_mode: core_only_equal_weight
  FAILURE_CONDITIONS:
  - Session specialists underperform outside their assumed windows with abrupt handoff
    effects.
  - Core/specialist blend introduces discontinuities at session boundaries.
  - Fallback triggers too frequently, reducing intended specialization benefit.
  EXPECTED_FAILURE_MODE: 'Boundary-friction: session handoffs and specialist inactivity
    create unstable exposure transitions.'
  entry_rules:
  - Compute core aggregate signal from H76,H77,H79,H78 with equal active weights.
  - If current UTC time in 08:00-16:00 and H81 active, combine core and H81 via 60/40
    weights.
  - If current UTC time in 16:00-24:00 and H82 active, combine core and H82 via 60/40
    weights.
  - Otherwise use fallback core-only aggregate.
  exit_rules:
  - Resize/flip when blended aggregate direction changes.
  - Flatten when neither core nor mapped specialist provides active signal.
  required_inputs:
  - Strategy signal states for H76,H77,H79,H81,H78,H82
  - UTC timestamp session mapping
  - BTC-USD 5m closes
  - ETH-USD 5m closes
  - Existing portfolio cap/exposure controls
  parameters:
    lookback_days: 180
    horizon_bars: 8
    fixed:
      candidate_universe:
      - H76
      - H77
      - H79
      - H81
      - H78
      - H82
      core_set:
      - H76
      - H77
      - H79
      - H78
      session_map:
        08:00-16:00: H81
        16:00-24:00: H82
      core_weight_share: 0.6
      specialist_weight_share: 0.4
      fallback_mode: core_only_equal_weight
  allowed_variants: []
  status: planned
- id: H101
  family: volatility_state
  class: tradeable_hypothesis
  logic_hash: 6e1ae8b27ab3447e5071ee5c42f3bac423378d3416122cf3539aae4d8eb95b24
  description: ATR expansion with realized-volatility containment continuation.
  rationale: Test directional continuation when local range expands but realized volatility
    remains below shock state.
  WHY: Use ATR14 and RV48 jointly to detect controlled expansion regimes distinct
    from slope-flip logic.
  RULES:
  - Require ATR14 percentile in [0.65, 0.90).
  - Require RV48 percentile in [0.40, 0.80).
  - Require BTC 5m close above vwap48 for long, below vwap48 for short.
  - Trade in the sign of close-vs-vwap48 displacement.
  PARAMETERS:
    lookback_days: 180
    horizon_bars: 8
    atr14_pct_min: 0.65
    atr14_pct_max: 0.9
    rv48_pct_min: 0.4
    rv48_pct_max: 0.8
    direction_source: close_vs_vwap48_sign
  FAILURE_CONDITIONS:
  - ATR expansion signals late-stage exhaustion instead of continuation.
  - RV containment band excludes too many opportunities.
  - VWAP displacement direction is unstable in chop.
  EXPECTED_FAILURE_MODE: Volatility-state aliasing causes entries during transient
    range bursts with poor follow-through.
  entry_rules:
  - Compute rolling percentiles for atr14 and rv48.
  - Allow entries only when 0.65 <= atr14_pct < 0.90 and 0.40 <= rv48_pct < 0.80.
  - If close > vwap48 enter long; if close < vwap48 enter short.
  exit_rules:
  - Hold for fixed horizon bars.
  required_inputs:
  - BTC-USD 5m OHLCV
  - atr14 feature
  - rv48 feature
  - vwap48 feature
  parameters:
    lookback_days: 180
    horizon_bars: 8
    fixed:
      atr14_pct_min: 0.65
      atr14_pct_max: 0.9
      rv48_pct_min: 0.4
      rv48_pct_max: 0.8
      direction_source: close_vs_vwap48_sign
  allowed_variants: []
  status: planned
