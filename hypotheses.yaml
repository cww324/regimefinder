dataset_defaults:
  primary_symbols:
  - BTC-USD
  secondary_symbols:
  - ETH-USD
  timeframe: 5m
  horizon_default_bars: 6
  lookback_default_days: 365
gates:
  baseline_cost_modes:
  - gross
  - bps8
  - bps10
  baseline_cost_config:
    gross:
      fee_bps: 0
      slip_bps: 0
    bps8:
      fee_bps: 0
      slip_bps: 8
    bps10:
      fee_bps: 0
      slip_bps: 10
  walkforward:
    train_days: 60
    test_days: 15
    step_days: 15
  bootstrap:
    iterations: 3000
    ci: 0.95
    report_metrics:
    - mean_ci_low
    - mean_ci_high
    - p_mean_gt_0
hypotheses:
- id: H15
  family: mean_reversion
  class: tradeable_hypothesis
  description: Frozen BTC mean-reversion entry (MR2) with ETH 1h trend confirmation.
  rationale: Legacy frozen definition transcribed from findings to remove pointer-only
    stubs.
  entry_rules:
  - 'BTC entry condition: vwap_z <= -2.0.'
  - 'ETH confirmation condition: ETH 1h close > EMA20 and EMA20 slope(3) > 0.'
  exit_rules:
  - Hold for fixed horizon bars.
  required_inputs:
  - BTC-USD 5m closes
  - BTC VWAP z-score
  - ETH-USD 5m closes
  - ETH 1h EMA20 and EMA20 slope(3)
  parameters:
    horizon_bars: 6
    fixed:
      btc_vwap_z_entry_max: -2.0
      eth_confirm_timeframe: 1h
      eth_ema_span: 20
      eth_ema_slope_lag_hours: 3
  allowed_variants: []
  status: frozen
